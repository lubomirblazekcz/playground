<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <link href="/src/style.css" rel="stylesheet">
    <script src="/src/main.js" type="module" async></script>
  </head>
  <body class="p-4 pt-46 min-h-[300vh]" is="x-app">
    <main class="flex justify-center gap-3">
      <div class="relative w-fit">
        <button
          class="bg-amber-300 hover:bg-amber-400 p-2.5 rounded-md transition cursor-pointer"
          id="popoverTrigger"
          command="toggle-popover"
          commandfor="defaultPopover"
          aria-haspopup="dialog"
          aria-expanded="false"
          aria-controls="defaultPopover"
        >
          Show Popover
        </button>
        <x-popover
            class="w-(--anchor-size,anchor-size(inline)) bottom"
            id="defaultPopover"
            style="--margin: calc(var(--spacing) * 3)"
            popover
            role="dialog"
            aria-labelledby="popoverTrigger"
        >
          <div class="x-popover-content bg-white shadow-sm p-3 my-(--margin)">
            Popover
            <div data-x-popover-part="custom">asdf</div>
          </div>
        </x-popover>
      </div>

      <div class="relative w-fit">
        <button
          class="bg-amber-300 hover:bg-amber-400 p-2.5 rounded-md transition cursor-pointer"
          interestfor="hoverPopover"
          aria-describedby="hoverPopover"
        >
          Show Tooltip
        </button>

        <x-popover
          class="bg-white shadow-sm p-3 top my-(--margin)"
          style="--margin: calc(var(--spacing) * 3)"
          id="hoverPopover"
          popover="hint"
          data-auto-update
          data-placement="top"
        >
          Tooltip
        </x-popover>
      </div>

      <div class="relative w-fit">
        <button
          class="bg-amber-300 hover:bg-amber-400 p-2.5 rounded-md transition cursor-pointer"
          command="show-modal"
          commandfor="defaultDialog"
        >
          Show Dialog
        </button>

        <dialog
          class="x-dialog p-6 max-w-132 w-full outline-0 rounded-md"
          id="defaultDialog"
          is="x-dialog"
          closedby="any"
        >
          Dialog
          <button command="close" commandfor="defaultDialog">Close</button>
        </dialog>
      </div>
    </main>

    <x-carousel class="x-carousel group/carousel max-w-6xl block mx-auto mt-8" id="defaultCarousel">
      <div
        class="x-carousel-content flex gap-6 rounded-2xl"
        tabindex="-1"
        data-x-carousel-part="content"
      >
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy" data-snapped>
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy">
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy">
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy">
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy">
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy">
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy">
        <img class="aspect-3/2 rounded-2xl max-w-full lg:max-w-105 md:max-w-[calc(50%-0.75rem)]" src="https://placehold.co/420x280" alt=" " width="420" height="280" loading="lazy">
      </div>
      <div class="flex items-center gap-4 justify-end mt-6 group-data-scroll-none/carousel:hidden">
        <div class="flex gap-2 mr-auto" data-x-carousel-part="pagination" aria-hidden="true"></div>
        <button class="x-button square md:lg px-0" type="button" data-x-carousel-part="prev" command="--scrollPrev" commandfor="defaultCarousel" aria-label="{_'Předchozí'}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
        </button>
        <button class="x-button square md:lg px-0" type="button" data-x-carousel-part="next" command="--scrollNext" commandfor="defaultCarousel" aria-label="{_'Následující'}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </button>
      </div>
  </body>
</html>
